<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>

    <style>
            *{
                background-color: black;
            }

        input{
            width: 250px;
            height: 60px;
            border: none;
            font-size:50px;
            text-align: right;
            background-color: black;
            color: aliceblue;
            border-radius: 20px;
        }

        button{
            width: 60px;
            height: 60px;
            border-radius:50px;
            border: none;
            margin: 1px;
            font-size:20px;
            font-weight:200;
        }

        .cero_button{
            width: 100%;
            border-radius: 80px;
            margin: 2px;
            text-align: left;
            padding-left: 25px;
        }

        .light_grey{
            background-color: #a6a6a6;
            color: black;
        }

        .dark_button{
            background-color: #333;
            color: white
        }

        .orange_button{
            background-color: orange;
            color: white;
        }

        ::placeholder{
            color: white;
        }

    </style>
</head>
<body>
    <table>
        <tr>
            <td colspan="4"> <input class="">    </td>
        </tr>

        <tr>
            <td><button class="light_grey">AC</td>
            <td><button class="light_grey">+/-</td>
            <td><button class="light_grey">%</td>
            <td><button class="orange_button">/</td>
        </tr>

        <tr>
            <td><button class="dark_button">7</td>
            <td><button class="dark_button">8</td>
            <td><button class="dark_button">9</td>
            <td><button class="orange_button">x</td>
        </tr>

        <tr>
            <td><button class="dark_button">4</td>
            <td><button class="dark_button">5</td>
            <td><button class="dark_button">6</td>
            <td><button class="orange_button">-</td>
        </tr>

        <tr>
            <td><button class="dark_button">1</td>
            <td><button class="dark_button">2</td>
            <td><button class="dark_button">3</td>
            <td><button class="orange_button">+</td>
        </tr>

        <tr>
            <td colspan="2">
                <button class="cero_button dark_button">0</button>
            </td>

            <td><button class="dark_button">.</td>
            <td><button class="orange_button">=</td>
        </tr>

        <tr>
            <td><button class="orange_button"> x2 </td>
            <td><button class="orange_button"> x3 </td>
            <td><button class="orange_button"> PI </td>
            <td><button class="orange_button">√</i> </td>
        </tr>
    </table>
</body>
</html>
